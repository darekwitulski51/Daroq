<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        :root {
            --niebieski-main-color: #00A2E8;
            --niebieski-sec-color: steelblue;
            --niebieski-bg-color: azure;
            --bialy-bg-color: white;
            --left-bg-color: #f0f4f8; 
            --lind-url: url('l-ind.png');
            --menu-url: url('menu-l.png');
        }

        body.dark {
            --niebieski-main-color: #55cdff; 
            --niebieski-sec-color: steelblue;  
            --niebieski-bg-color: #1e1e24;   
            --bialy-bg-color: #2a2a35;
            --left-bg-color: #141416; 
            --lind-url: url('d-ind.png');
            --menu-url: url('menu-d.png');
        }

        body {
            margin: 0; 
            background-color: var(--niebieski-bg-color); 
            color: var(--niebieski-sec-color); 
            font-family: Arial; 
            transition: background-color 0.5s linear, color 0.5s linear;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            flex-direction: row;
            background-color: var(--bialy-bg-color);
            transition: background-color 0.5s linear;
        }

        header > div {
            width: 50px;
            height: 50px;
            margin: 15px;
        }

        #lind {
            background-image: var(--lind-url);
            background-size: contain;     
            background-repeat: no-repeat; 
            background-position: center;
            cursor: pointer;
        }

        #menu {
            background-image: var(--menu-url);
            background-size: contain;     
            background-repeat: no-repeat; 
            background-position: center;
            cursor: pointer;
        }

        .space {
            flex-grow: 1; 
        }

        main {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            height: 0; 
        }

        .nav-panel {
            width: 30%;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #right-up {
            font-size: clamp(4rem, 5vw, 6rem); 
            padding: 5%;
            color: var(--niebieski-main-color);
        }

        #right-down {
            padding-left: 5%;
            font-size: 200%;
        }

        #right-down > ul {
            list-style: none;
            padding: 0;
        }

        #right-down > ul > li {
            margin: 15px 0;
            transition: transform 0.5s linear, color 0.5s linear;
            cursor: pointer;
        }

        #right-down > ul > li:hover {
            color: var(--niebieski-main-color);
            transform: scale(1.05);
        }

        #left {
            flex-grow: 1;
            height: 100%;
            background-color: var(--left-bg-color); 
            transition: background-color 0.5s linear;   
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
        }

        #left .content {
            display: none;
        }

        #left .content.active {
            display: block;
        }

        a:link {
            color: var(--niebieski-main-color);
        }
        a:visited {
            color: var(--niebieski-sec-color);
        }

        @media (max-width: 768px) {
            body {
                overflow: auto; 
                height: auto;
            }

            main {
                flex-direction: column; 
                height: auto;
            }

            .nav-panel {
                width: 100%;
            }

            #left {
                width: 100%;
                height: auto;
                overflow-y: visible; 
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div id="menu"></div>
        <p class="space"></p>
        <div id="lind" onclick="tryb()"></div>
    </header>
    
    <main>
        <div class="nav-panel">
            <section id="right-up"><b>DARIUSZ<br>WITULSKI</b></section>
            <section id="right-down">
                <h2>Jakieś coś:</h2> 
                <ul>
                    <li onclick="widok('o-mnie')">O mnie</li>
                    <li onclick="widok('projekty')">Projekty</li>
                </ul>
            </section>
        </div>

        <section id="left">
            <div id="o-mnie" class="content active">
                <h1>O mnie</h1>
                <p>Mam na imię Darek i jestem uczniem <a href="https://tme.szczecin.pl/">Zespołu szkół elektryczno elektronicznych imienia Maksymiliana Tytusa Hubera</a> w szczecinie znanego również jako TME.</p>
                
            </div>
            <div id="projekty" class="content">
                <h1>Projekty</h1>
                <p>Tutaj "są" projekty.</p>
            </div>
        </section>
    </main>

    <script>
    function widok(idPodstrony) {
        const podstrony = document.querySelectorAll('.content');
        podstrony.forEach(podstrona => {
            podstrona.classList.remove('active');
        });

        const Podstrona = document.getElementById(idPodstrony);
        if (Podstrona) {
            Podstrona.classList.add('active');
        }
    }

    function tryb() {
        document.body.classList.toggle('dark');
    }
    </script>
</body>
</html>
